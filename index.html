<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowsen - Lunettes de Piscine</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #e6f1ff;
            overflow-x: hidden;
            background: #020c1b;
        }

        /* FOND EAU ANIMÉ */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(0,198,255,0.15), transparent 60%),
                        radial-gradient(circle at 70% 60%, rgba(29,78,216,0.2), transparent 60%),
                        linear-gradient(120deg, #020c1b, #0a192f, #112240);
            animation: waterMove 20s linear infinite;
            z-index: -3;
        }

        /* REFLETS PISCINE */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: repeating-radial-gradient(circle at 50% 50%,
                        rgba(255,255,255,0.06) 0px,
                        rgba(255,255,255,0.06) 2px,
                        transparent 4px,
                        transparent 40px);
            animation: causticsMove 12s linear infinite;
            opacity: 0.4;
            z-index: -2;
            mix-blend-mode: overlay;
        }

        /* LUMIÈRE CURSEUR */
        .cursor-light {
            position: fixed;
            width: 300px;
            height: 300px;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,198,255,0.25) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        @keyframes waterMove {
            0% { transform: translate(0,0); }
            50% { transform: translate(-5%, -5%); }
            100% { transform: translate(0,0); }
        }

        @keyframes causticsMove {
            0% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-10%, -10%) scale(1.2); }
            100% { transform: translate(0,0) scale(1); }
        }

        /* NAVBAR FIXE */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: rgba(2,12,27,0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            z-index: 1000;
        }

        nav a {
            color: #64ffda;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffffff;
        }

        header {
            margin-top: 70px;
            background: linear-gradient(90deg, #0a192f, #112240, #1d4ed8);
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* MENU MOBILE */
        .menu-toggle {
            display: none;
            position: fixed;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            z-index: 1100;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: center;
                display: none;
            }

            nav.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .product {
            background: rgba(17,34,64,0.85);
            backdrop-filter: blur(6px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,198,255,0.3);
        }

        footer {
            text-align: center;
            padding: 20px;
        }

        /* EFFET TEXTE LUMINEUX */
        h1 {
            text-shadow: 0 0 10px rgba(0,198,255,0.8),
                         0 0 20px rgba(0,198,255,0.6),
                         0 0 40px rgba(29,78,216,0.5);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(0,198,255,0.6),
                             0 0 20px rgba(0,198,255,0.4);
            }
            to {
                text-shadow: 0 0 20px rgba(0,198,255,1),
                             0 0 40px rgba(29,78,216,0.8);
            }
        }
    </style>
</head>
<body>

<div class="cursor-light" id="cursorLight"></div>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav id="nav">
    <a href="index.html">Accueil</a>
    <a href="index.html#produits">Produits</a>
    <a href="about.html">À propos</a>
    <a href="contact.html">Contact</a>
</nav>

<header>
    <h1>Flowsen</h1>
    <p>Lunettes de piscine haute performance</p>
</header>

<section class="hero">
    <h1>Voyez sous l'eau comme jamais auparavant</h1>
</section>

<section id="produits" class="products">
    <div class="product">
        <h3>Flowsen Pro</h3>
    </div>
    <div class="product">
        <h3>Flowsen Elite</h3>
    </div>
</section>

<footer>
    <p>&copy; 2026 Flowsen</p>
</footer>

<script>
function toggleMenu() {
    document.getElementById('nav').classList.toggle('active');
}

const light = document.getElementById('cursorLight');
document.addEventListener('mousemove', (e) => {
    light.style.left = e.clientX + 'px';
    light.style.top = e.clientY + 'px';
});
</script>

</body>
</html>
