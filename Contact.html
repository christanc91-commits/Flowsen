
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowsen - Contact</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#020c1b;
    color:#e6f1ff;
}

/* NAVBAR */
nav {
    position: fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    background:rgba(2,12,27,0.9);
    padding:15px;
}

nav a {
    color:#64ffda;
    text-decoration:none;
}

/* CONTAINER */
.container {
    padding:100px 20px;
    max-width:1000px;
    margin:auto;
}

/* TITRE */
h1 {
    text-align:center;
    color:#00c6ff;
}

/* GRID */
.contact-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    margin-top:40px;
}

/* FORM */
form {
    background:rgba(17,34,64,0.8);
    padding:20px;
    border-radius:10px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button {
    background:linear-gradient(90deg,#1d4ed8,#00c6ff);
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

/* INFOS */
.info {
    background:rgba(17,34,64,0.8);
    padding:20px;
    border-radius:10px;
}

/* RESEAUX */
.social a {
    display:inline-block;
    margin:10px;
    color:#00c6ff;
    font-size:20px;
}

/* MAP */
iframe {
    width:100%;
    height:200px;
    border:none;
    border-radius:10px;
    margin-top:15px;
}

/* MOBILE */
@media(max-width:768px){
    .contact-grid {
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Accueil</a>
    <a href="index.html#produits">Produits</a>
    <a href="about.html">À propos</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

<h1>Contactez-nous</h1>

<div class="contact-grid">

<!-- FORMULAIRE -->
<form>
    <h3>Envoyer un message</h3>
    <input type="text" placeholder="Nom" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Votre message" rows="5" required></textarea>
    <button>Envoyer</button>
</form>

<!-- INFOS -->
<div class="info">
    <h3>Informations</h3>
    <p>📧 Email : contact@flowsen.com</p>
    <p>📞 Téléphone : +33 6 00 00 00 00</p>
    <p>📍 Adresse : Cherbourg, France</p>

    <!-- CARTE -->
    <iframe 
    src="https://www.google.com/maps?q=Cherbourg&output=embed">
    </iframe>

    <!-- RESEAUX -->
    <div class="social">
        <a href="#">Instagram</a>
        <a href="#">Facebook</a>
        <a href="#">TikTok</a>
    </div>
</div>

</div>

</div>

</body>
</html>
