
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowsen - Contact</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin:0;
    font-family:Arial;
    color:#e6f1ff;
    background:linear-gradient(120deg,#020c1b,#0a192f,#112240);
}

/* NAV */
nav {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    background:rgba(2,12,27,0.85);
    padding:15px;
    backdrop-filter:blur(10px);
}

nav a {
    color:#64ffda;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover {
    color:#00c6ff;
}

/* CONTAINER */
.container {
    padding:120px 20px;
    max-width:1000px;
    margin:auto;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

/* CARD */
.card {
    background:rgba(17,34,64,0.8);
    padding:25px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,198,255,0.2);
    transition:0.4s;
}

.card:hover {
    transform:translateY(-5px) scale(1.02);
}

/* FORM */
input, textarea {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button {
    background:linear-gradient(90deg,#1d4ed8,#00c6ff);
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(0,198,255,0.6);
}

/* MAP */
iframe {
    width:100%;
    height:200px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

/* SOCIAL */
.social a {
    display:inline-block;
    margin:10px;
    color:#00c6ff;
    text-decoration:none;
    transition:0.3s;
}

.social a:hover {
    color:#64ffda;
}

/* ANIMATION SCROLL */
.reveal {
    opacity:0;
    transform:translateY(40px);
    transition:0.8s ease;
}

.reveal.active {
    opacity:1;
    transform:translateY(0);
}

/* MOBILE */
@media(max-width:768px){
    .grid {
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Accueil</a>
    <a href="index.html#produits">Produits</a>
    <a href="about.html">À propos</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

<h1 class="reveal" style="text-align:center; color:#00c6ff;">
Contactez-nous
</h1>

<div class="grid">

<!-- FORMULAIRE -->
<div class="card reveal">
    <h3>Envoyer un message</h3>

    <form action="https://formspree.io/f/TON_ID" method="POST">
        <input type="text" name="name" placeholder="Nom" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" rows="5" placeholder="Votre message" required></textarea>
        <button type="submit">Envoyer</button>
    </form>
</div>

<!-- INFOS -->
<div class="card reveal">
    <h3>Informations</h3>

    <p>📧 contact@flowsen.com</p>
    <p>📞 +33 6 00 00 00 00</p>
    <p>📍 France</p>

    <iframe src="https://www.google.com/maps?q=France&output=embed"></iframe>

    <div class="social">
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">Facebook</a>
    </div>
</div>

</div>

</div>

<script>
// ANIMATION SCROLL
const reveals = document.querySelectorAll('.reveal');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('active');
        }
    });
});

reveals.forEach(el => observer.observe(el));
</script>

</body>
</html>
