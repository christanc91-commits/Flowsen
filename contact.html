<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowsen - Contactez-moi</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:#e6f1ff;
    background:#020c1b;
}

/* NAV */
nav {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    background:rgba(2,12,27,0.85);
    padding:15px;
}

nav a {
    color:#64ffda;
    text-decoration:none;
}

/* CONTAINER */
.container {
    padding:120px 20px;
    max-width:600px;
    margin:auto;
    text-align:center;
}

/* CARTE */
.card {
    background:rgba(17,34,64,0.8);
    padding:30px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,198,255,0.2);
}

/* FORM */
input, textarea {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button {
    background:linear-gradient(90deg,#1d4ed8,#00c6ff);
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(0,198,255,0.6);
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Accueil</a>
    <a href="index.html#produits">Produits</a>
    <a href="about.html">À propos</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

<div class="card">
    <h1 style="color:#00c6ff;">Contactez-moi</h1>

    <p>Une question ? Un projet ? Écris-moi 👇</p>

    <form action="https://formspree.io/f/TON_ID" method="POST">
        <input type="text" name="name" placeholder="Votre nom" required>
        <input type="email" name="email" placeholder="Votre email" required>
        <textarea name="message" rows="5" placeholder="Votre message..." required></textarea>
        <button type="submit">Envoyer</button>
    </form>

</div>

</div>

</body>
